<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IronLog">

<link rel="manifest" href="./manifest.json">
<title>IRON·LOG</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0b0b18;--card:#131324;--panel:#151530;--border:#1e1e36;--text:#ddd;--dim:#555;--accent:#818cf8;--green:#22c55e;--red:#dc2626;--amber:#f59e0b}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
#app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.header{padding:14px 14px 6px;padding-top:calc(env(safe-area-inset-top,20px) + 10px);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font:800 19px 'Courier New',monospace;color:#eee;letter-spacing:-0.5px}
.date-chip{font-size:12px;color:#888;background:var(--card);padding:5px 12px;border-radius:20px}
.date-nav{display:flex;justify-content:center;gap:8px;padding:6px 14px 12px;flex-shrink:0}
.date-btn{background:var(--card);border:none;color:#888;font-size:14px;padding:6px 16px;border-radius:8px;font-weight:600}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,20px)}
.day-card{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 12px;margin-bottom:5px;border-radius:10px;border:none;background:var(--card);cursor:pointer;text-align:left}
.day-left{display:flex;align-items:center;gap:10px;flex:1}
.day-name{font-size:13px;font-weight:700;color:#ddd}
.day-num{font-size:11px;color:var(--dim);margin-top:1px}
.day-right{display:flex;align-items:center;gap:8px}
.ex-btn{width:100%;display:flex;align-items:center;padding:11px 10px;border-radius:8px;border:none;cursor:pointer;background:#111122;text-align:left;margin-bottom:5px}
.ex-name{font-size:13px;font-weight:600;color:#ddd}
.ex-rx{font-size:11px;color:var(--dim);margin-top:2px;font-family:monospace}
.ex-preview{font-size:10px;color:#4a4a6a;margin-top:3px;font-family:monospace}
.ex-panel{padding:10px;background:var(--panel);border-radius:0 0 8px 8px;margin-top:-7px;margin-bottom:5px}
.ref-box{background:#0c0c1a;border-radius:8px;padding:8px 10px;margin-bottom:10px;border-left:2px solid #252540;font-size:11px;color:#888}
.ref-box .label{font-size:9px;color:#555;letter-spacing:1px;font-weight:700;margin-bottom:3px}
.ref-box .vals{font-family:monospace;font-size:12px}
.ref-box .pr{color:var(--amber)}
.set-tabs{display:flex;gap:3px;margin-bottom:10px}
.set-tab{border:none;padding:6px 12px;border-radius:6px 6px 0 0;cursor:pointer;font:600 12px monospace;background:#0e0e1e;color:#444;border-bottom:2px solid transparent}
.set-tab.active{background:#2a2a4a;color:#fff;border-bottom-color:var(--accent)}
.set-tab.done{background:#142014;color:var(--green)}
.field-label{font:700 10px/1 sans-serif;color:var(--dim);letter-spacing:1.5px;margin-bottom:6px;display:block;margin-top:10px}
.field-label:first-child{margin-top:0}
.quick-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.q-btn{border:none;padding:9px 12px;border-radius:8px;cursor:pointer;font:400 13px monospace;min-width:40px;text-align:center;background:#141428;color:#888;transition:background .1s}
.q-btn.on{background:var(--accent);color:#fff;font-weight:700}
.inp{width:100%;background:#0c0c1a;border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font:15px monospace;outline:none}
.inp:focus{border-color:var(--accent)}
textarea.inp{font:14px -apple-system,sans-serif;resize:vertical}
.next-btn{width:100%;background:var(--accent);border:none;color:#fff;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.3px;margin-top:8px}
.quick-done{margin-top:8px;width:100%;background:#0c1a0c;border:1px solid #22c55e20;color:var(--green);padding:10px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.note-toggle{background:none;border:none;color:#555;font-size:12px;cursor:pointer;padding:6px 0}
.add-btn{width:100%;background:none;border:1px dashed #282838;color:#666;padding:12px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;margin-top:4px}
.add-panel{background:var(--card);border-radius:12px;padding:14px;margin-top:6px}
.custom-add{background:#f59e0b12;border:1px solid #f59e0b30;color:var(--amber);padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;text-align:left}
.extra-opt{width:100%;display:flex;justify-content:space-between;align-items:center;background:none;border:none;border-bottom:1px solid #181830;color:#bbb;padding:10px 4px;font-size:13px;cursor:pointer;text-align:left}
.extra-tag{font-size:8px;color:var(--amber);background:#f59e0b15;padding:1px 5px;border-radius:4px;font-weight:700;margin-left:6px}
.vol-toggle{display:block;margin:10px auto;background:none;border:1px solid #222;color:#666;font-size:12px;padding:6px 16px;border-radius:20px;cursor:pointer;font-weight:500}
.vol-card{margin:6px 14px;padding:14px;background:var(--card);border-radius:12px}
.vol-row{margin-bottom:8px}
.vol-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.vol-bar{height:5px;background:#1a1a2e;border-radius:3px;overflow:hidden}
.vol-fill{height:100%;border-radius:3px;transition:width 0.3s}
.sess-head{padding:12px 14px;padding-top:calc(env(safe-area-inset-top,20px) + 10px);display:flex;align-items:center;gap:10px;border-bottom:1px solid #181830;flex-shrink:0}
.back-btn{background:none;border:none;color:var(--accent);font-size:16px;cursor:pointer;padding:4px 8px;font-weight:700}
.rest-bar{margin:0 10px 8px;background:#141428;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rest-time{font:800 22px monospace;color:var(--accent)}
.rest-time.warn{color:var(--red)}
.rest-btns{display:flex;gap:6px}
.rest-btn{background:#1e1e36;border:none;color:#888;padding:4px 8px;border-radius:6px;font-size:11px;cursor:pointer}
.rest-btn.on{background:var(--accent);color:#fff}
.rest-btn.stop{background:#261616;color:var(--red)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:700;z-index:100;box-shadow:0 4px 20px rgba(34,197,94,0.3);animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.data-panel{margin:0 14px 10px;padding:14px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.data-btn{flex:1;background:#141428;border:1px solid #2a2a4a;color:var(--accent);padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.remove-btn{margin-top:10px;width:100%;background:none;border:1px solid #331a1a;color:var(--red);font-size:12px;padding:8px;border-radius:8px;cursor:pointer}
.cardio-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.cardio-field{display:flex;flex-direction:column;gap:4px}
.cardio-field label{font:700 9px sans-serif;color:var(--dim);letter-spacing:1px}
.cardio-field .inp{font-size:14px;padding:8px 10px}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── DATA ───
const PROGRAM = {
  "Day 1 - Zone 2 + Arms/Delts": {
    color:"#2563eb",icon:"🫁",exercises:[
      {name:"Zone 2 Cardio",rx:"45–60 min @ 65–75% HRmax",type:"cardio",sets:1},
      {name:"Incline DB Press",rx:"2 × 6–8 | RIR 1",type:"strength",sets:2},
      {name:"Chest-Supported Row",rx:"2 × 6–8 | RIR 1",type:"strength",sets:2},
      {name:"Machine Lateral Raise",rx:"2 × 12–15 | To failure",type:"strength",sets:2},
      {name:"Rope Triceps Pushdown",rx:"1–2 × 10–12 | To failure",type:"strength",sets:2},

    ]},
  "Day 2 - 4x4 + Pull": {

      {name:"4×4 Protocol",rx:"4 min @ 90–95% HRmax | 3 min easy jog",type:"cardio",sets:1},
      {name:"Neutral-Grip Pull-Ups",rx:"2 × 6–8 | RIR 1",type:"strength",sets:2},
      {name:"Lat Pulldown",rx:"1–2 × 8–10 | RIR 1",type:"strength",sets:2},

      {name:"DB Shrugs",rx:"2 × 10–12 | RIR 1",type:"strength",sets:2},

    ]},
  "Day 3 - Zone 2 + Mobility": {

      {name:"Zone 2 Cardio (Long)",rx:"60–75 min @ 65–75% HRmax",type:"cardio",sets:1},
      {name:"Mobility Circuit",rx:"10 min | Hip CARs, Ankle, T-spine",type:"mobility",sets:1},
    ]},
  "Day 4 - Threshold + Push": {
    color:"#ea580c",icon:"🔥",exercises:[
      {name:"Threshold Run",rx:"Wk1-3: 20-25min @85% | Wk4-6: 2×15 @LT-5",type:"cardio",sets:1},
      {name:"Landmine Press",rx:"2 × 6–8 | RIR 1",type:"strength",sets:2},
      {name:"Machine Chest Press",rx:"2 × 6–8 | RIR 1",type:"strength",sets:2},
      {name:"Low-Angle Cable Fly",rx:"1–2 × 12–15 | To failure",type:"strength",sets:2},
      {name:"OH Rope Triceps Extension",rx:"1–2 × 10–12 | To failure",type:"strength",sets:2},
    ]},
  "Day 5 - Lower": {
    color:"#7c3aed",icon:"🦵",exercises:[
      {name:"Safety Bar Squat",rx:"2 × 5–6 | RPE 7.5–8",type:"strength",sets:2},
      {name:"Romanian Deadlift",rx:"2 × 6–8 | RIR 1",type:"strength",sets:2},
      {name:"Walking Lunges",rx:"1–2 × 10/leg | RIR 1",type:"strength",sets:2},
      {name:"Seated Leg Curl",rx:"1–2 × 10–12 | Near failure",type:"strength",sets:2},
      {name:"Seated Leg Extension",rx:"1–2 × 10–12 | Near failure",type:"strength",sets:2},
      {name:"Standing Calf Raise",rx:"2 × 12–15 | Controlled",type:"strength",sets:2},
    ]},
  "Day 6 - LSD": {
    color:"#0891b2",icon:"🏃",exercises:[
      {name:"Long Slow Distance",rx:"60–75 min @ 65–70% HRmax",type:"cardio",sets:1},
    ]},
  "Day 7 - Rest/Integrity": {
    color:"#6b7280",icon:"🔄",exercises:[
      {name:"Copenhagen Plank",rx:"2 × 20 sec/side",type:"mobility",sets:2},
      {name:"Tibialis Raises",rx:"2 × 15",type:"mobility",sets:2},
      {name:"Single-Leg RDL (light)",rx:"2 × 8/side",type:"mobility",sets:2},
      {name:"Scapular Wall Slides",rx:"2 × 12",type:"mobility",sets:2},
    ]},
};
const COMMON_EXTRAS=["Face Pulls","Cable Crossover","Hammer Curl","Preacher Curl","Barbell Curl","Skull Crushers","Dips","Close-Grip Bench","Arnold Press","DB Lateral Raise","Upright Row","Barbell Row","T-Bar Row","Seated Cable Row","Pendlay Row","Front Squat","Hack Squat","Leg Press","Hip Thrust","Bulgarian Split Squat","Sumo Deadlift","Conventional Deadlift","Good Morning","Glute Ham Raise","Cable Crunch","Hanging Leg Raise","Ab Wheel","Farmer's Walk","Incline Walk","Stairmaster","Rowing Machine","Bike Sprint"];
const MUSCLE_MAP={"Incline DB Press":["Chest"],"Machine Chest Press":["Chest"],"Landmine Press":["Chest","Delts"],"Low-Angle Cable Fly":["Chest"],"Cable Crossover":["Chest"],"Chest-Supported Row":["Back"],"Neutral-Grip Pull-Ups":["Back"],"Lat Pulldown":["Back"],"Kneeling Cable Lat Pulldown":["Back"],"Barbell Row":["Back"],"T-Bar Row":["Back"],"Seated Cable Row":["Back"],"Pendlay Row":["Back"],"Rear Delt Cable Fly":["Delts"],"Machine Lateral Raise":["Delts"],"DB Shrugs":["Delts"],"Face Pulls":["Delts"],"Arnold Press":["Delts"],"DB Lateral Raise":["Delts"],"Upright Row":["Delts"],"Rope Triceps Pushdown":["Arms"],"OH Rope Triceps Extension":["Arms"],"Incline DB Curl":["Arms"],"Skull Crushers":["Arms"],"Dips":["Arms","Chest"],"Close-Grip Bench":["Arms","Chest"],"Hammer Curl":["Arms"],"Preacher Curl":["Arms"],"Barbell Curl":["Arms"],"Safety Bar Squat":["Quads","Glutes"],"Walking Lunges":["Quads","Glutes"],"Seated Leg Extension":["Quads"],"Front Squat":["Quads"],"Hack Squat":["Quads"],"Leg Press":["Quads","Glutes"],"Bulgarian Split Squat":["Quads","Glutes"],"Romanian Deadlift":["Hamstrings","Glutes"],"Seated Leg Curl":["Hamstrings"],"Good Morning":["Hamstrings","Glutes"],"Glute Ham Raise":["Hamstrings"],"Hip Thrust":["Glutes"],"Standing Calf Raise":["Calves"],"Sumo Deadlift":["Glutes","Hamstrings"],"Conventional Deadlift":["Back","Hamstrings"],"Pallof Press":["Core"],"Cable Crunch":["Core"],"Hanging Leg Raise":["Core"],"Ab Wheel":["Core"]};
const VOL_TARGETS={Back:[12,14],Chest:[5,7],Delts:[5,7],Arms:[5,7],Quads:[5,7],Hamstrings:[5,7],Glutes:[5,7]};
const RIR_OPTS=["0 (F)","1","1-2","2","2-3","3","3-5"];
const REST_OPTS=[{label:"1:30",sec:90},{label:"3:00",sec:180},{label:"5:00",sec:300}];
// Exercise-specific seed weights from Jeff's gym tracker history
const SEED_WEIGHTS={
  "Incline DB Press":[100,110,120,130,140,150],
  "Chest-Supported Row":[70,75,80,82.5,85,90],
  "Machine Lateral Raise":[10,12,14,15.5,17,20],
  "Rope Triceps Pushdown":[35,37.5,40,42.5,44,45.5,47.5,50],
  "Incline DB Curl":[45,50,55,60,65],
  "Landmine Press":[25,30,32.5,35,37.5,40],
  "Machine Chest Press":[90,95,100,105,110,115,120],
  "Low-Angle Cable Fly":[15,17.5,20,22.5,25],
  "OH Rope Triceps Extension":[30,35,37.5,39,42.5,45],
  "Neutral-Grip Pull-Ups":[0,5,10,15,20,25],
  "Lat Pulldown":[85,90,95,97.5,100,105],
  "Kneeling Cable Lat Pulldown":[40,45,50,52.5,55,60],
  "Rear Delt Cable Fly":[70,80,85,90,100],
  "DB Shrugs":[60,65,70,75,80,85],
  "Pallof Press":[20,25,30,35,40],
  "Safety Bar Squat":[115,125,135,140,145,155],
  "Romanian Deadlift":[135,145,155,160,170,180,185],
  "Walking Lunges":[70,80,90,95,100],
  "Seated Leg Curl":[100,110,115,125,135,145],
  "Seated Leg Extension":[90,100,105,110,115,120],
  "Standing Calf Raise":[140,160,180,200,220,240],
};
const FALLBACK_WEIGHTS=[25,35,45,55,65,75,85,95];

// ─── STORAGE ───
const LS={get(k,d){try{const v=localStorage.getItem('ironlog-'+k);return v?JSON.parse(v):d}catch{return d}},set(k,v){try{localStorage.setItem('ironlog-'+k,JSON.stringify(v))}catch{}}};
let history=LS.get('history',{});
let customExercises=LS.get('customs',[]);
let weightMemory=LS.get('weights',{});
function save(){LS.set('history',history);LS.set('customs',customExercises);LS.set('weights',weightMemory)}

// ─── STATE ───
let V={view:'home',date:new Date(),day:null,openEx:null,curSet:0,showVol:false,showData:false,showAdd:false,addFilter:'',restSec:0,restDur:90,restOn:false};
function dk(){return V.date.toISOString().split('T')[0]}
function sess(){return history[dk()]||{}}
function exSets(n){return sess()[n]||[]}
function fmtDate(d){const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],w=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];return w[d.getDay()]+', '+m[d.getMonth()]+' '+d.getDate()}
function fmtTime(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')}

// ─── DATA HELPERS (no render) ───
function setData(exName,si,field,val){
  const d=dk();
  if(!history[d])history[d]={_day:V.day};
  if(!history[d][exName])history[d][exName]=[];
  while(history[d][exName].length<=si)history[d][exName].push({});
  history[d][exName][si][field]=val;
  if(field==='weight'&&val){
    const num=parseFloat(val);
    if(!isNaN(num)){
      if(!weightMemory[exName])weightMemory[exName]=[];
      if(!weightMemory[exName].includes(num)){
        weightMemory[exName].push(num);
        weightMemory[exName].sort((a,b)=>a-b);
        if(weightMemory[exName].length>15)weightMemory[exName]=weightMemory[exName].slice(-15);
      }
    }
  }
  save();
}
function setCardio(exName,field,val){
  const d=dk();
  if(!history[d])history[d]={_day:V.day};
  if(!history[d][exName])history[d][exName]=[{}];
  if(!history[d][exName][0])history[d][exName][0]={};
  history[d][exName][0][field]=val;
  history[d][exName][0].type='cardio';
  save();
}
function getPrev(exName){
  const d=dk();
  for(const k of Object.keys(history).sort().reverse()){
    if(k===d)continue;
    const s=history[k]?.[exName];
    if(s?.length>0&&(s[0].weight||s[0].duration))return{date:k,sets:s};
  }
  return null;
}
function getPR(exName){
  let best=null;
  Object.keys(history).forEach(d=>{
    const s=history[d]?.[exName];
    if(!Array.isArray(s))return;
    s.forEach(set=>{
      const w=parseFloat(set.weight);
      if(!isNaN(w)&&(!best||w>best.weight))best={weight:w,reps:set.reps||'?',date:d};
    });
  });
  return best;
}
function getWeights(exName){
  // Start with exercise-specific seeds or fallback
  let base = SEED_WEIGHTS[exName] || FALLBACK_WEIGHTS;
  // Merge in any weights from previous sessions
  const prev=getPrev(exName);
  if(prev){
    prev.sets.forEach(s=>{const w=parseFloat(s.weight);if(!isNaN(w)&&!base.includes(w))base=[...base,w]});
  }
  // Merge in any custom weight memory (even just 1 entry)
  const mem=weightMemory[exName];
  if(mem&&mem.length>0){
    mem.forEach(w=>{if(!base.includes(w))base=[...base,w]});
  }
  // Also include weights from today's session for this exercise
  const today=exSets(exName);
  today.forEach(s=>{const w=parseFloat(s.weight);if(!isNaN(w)&&!base.includes(w))base=[...base,w]});
  // Sort, dedupe, cap at 12
  base=[...new Set(base)].sort((a,b)=>a-b);
  if(base.length>12){
    // Keep weights closest to the most recent value
    const recent=today.length>0?parseFloat(today[today.length-1].weight):
      (prev?.sets[0]?.weight?parseFloat(prev.sets[0].weight):null);
    if(recent){
      base.sort((a,b)=>Math.abs(a-recent)-Math.abs(b-recent));
      base=base.slice(0,12).sort((a,b)=>a-b);
    } else {
      base=base.slice(-12);
    }
  }
  return base;
}
function weeklyVol(){
  const start=new Date(V.date);start.setDate(V.date.getDate()-V.date.getDay());
  const end=new Date(start);end.setDate(start.getDate()+6);
  const vol={};
  Object.keys(history).forEach(d=>{const dt=new Date(d+'T12:00:00');
    if(dt>=start&&dt<=end){Object.keys(history[d]).forEach(ex=>{if(ex.startsWith('_'))return;
      (MUSCLE_MAP[ex]||[]).forEach(m=>{const sets=Array.isArray(history[d][ex])?history[d][ex].filter(s=>s.weight||s.reps):[];vol[m]=(vol[m]||0)+sets.length})});}});
  return vol;
}
function doneCount(exercises){const s=sess();return exercises.filter(ex=>{const d=s[ex.name];if(!d)return false;
  if(ex.type==='cardio'||ex.type==='mobility')return d.length>0&&(d[0].notes||d[0].duration);
  return d.length>0&&d.some(x=>x.weight||x.reps)}).length}

// ─── REST TIMER ───
let restIv=null;
function startRest(dur){V.restDur=dur||V.restDur;V.restSec=V.restDur;V.restOn=true;
  if(restIv)clearInterval(restIv);
  restIv=setInterval(()=>{V.restSec--;if(V.restSec<=0){clearInterval(restIv);restIv=null;V.restOn=false}renderRestBar()},1000);
  renderRestBar();
}
function stopRest(){if(restIv)clearInterval(restIv);restIv=null;V.restOn=false;V.restSec=0;renderRestBar()}
function renderRestBar(){
  const el=document.getElementById('rest-bar');
  if(!el)return;
  if(!V.restOn){el.style.display='none';return}
  el.style.display='flex';
  el.querySelector('.rest-time').textContent=fmtTime(V.restSec);
  el.querySelector('.rest-time').className='rest-time'+(V.restSec<=5?' warn':'');
  el.querySelectorAll('.rest-opt').forEach(b=>{b.className='rest-btn rest-opt'+(parseInt(b.dataset.sec)===V.restDur?' on':'')});
}

// ─── TOAST ───
let toastTimer=null;
function toast(msg){
  clearTimeout(toastTimer);
  let el=document.getElementById('toast-el');
  if(!el){el=document.createElement('div');el.id='toast-el';el.className='toast';document.getElementById('app').appendChild(el)}
  el.textContent=msg;el.style.display='block';
  toastTimer=setTimeout(()=>{el.style.display='none'},1600);
}

// ─── DOM HELPER ───
function h(tag,attrs,...ch){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='class')el.className=v;
    else if(k.startsWith('on'))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else el.setAttribute(k,v)});
  ch.flat().forEach(c=>{if(c!=null)el.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return el;
}

// ─── RENDER ───
function render(){
  const app=document.getElementById('app');app.innerHTML='';
  if(V.view==='home')renderHome(app);
  else if(V.view==='session')renderSession(app);
}

function renderHome(app){
  app.appendChild(h('div',{class:'header'},
    h('span',{class:'logo'},'IRON·LOG'),
    h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
      h('button',{style:{background:'none',border:'none',fontSize:'14px',cursor:'pointer',padding:'2px 6px'},onClick:()=>{V.showData=!V.showData;render()}},'⚙️'),
      h('div',{class:'date-chip'},fmtDate(V.date)))));

  if(V.showData){
    const cnt=Object.keys(history).length;
    app.appendChild(h('div',{class:'data-panel'},
      h('div',{style:{fontSize:'11px',fontWeight:700,color:'#777',marginBottom:'8px',letterSpacing:'1px'}},'DATA ('+cnt+' sessions)'),
      h('div',{style:{display:'flex',gap:'8px',marginBottom:'8px'}},
        h('button',{class:'data-btn',onClick:exportXlsx},'📊 Excel'),
        h('button',{class:'data-btn',onClick:exportJson},'↓ JSON'),
        h('button',{class:'data-btn',onClick:importJson},'↑ Import')),
      cnt>0?h('button',{class:'remove-btn',onClick:()=>{if(confirm('Delete ALL data?')){history={};customExercises=[];weightMemory={};save();V.showData=false;toast('Cleared');render()}}},'Clear All Data'):null,
      h('div',{style:{marginTop:'8px',fontSize:'10px',color:'#444',lineHeight:'1.6'}},'Data saved to this device via localStorage.')));
  }

  app.appendChild(h('div',{class:'date-nav'},
    h('button',{class:'date-btn',onClick:()=>{V.date=new Date(V.date);V.date.setDate(V.date.getDate()-1);render()}},'◀'),
    h('button',{class:'date-btn',style:{fontSize:'11px',padding:'6px 14px'},onClick:()=>{V.date=new Date();render()}},'TODAY'),
    h('button',{class:'date-btn',onClick:()=>{V.date=new Date(V.date);V.date.setDate(V.date.getDate()+1);render()}},'▶')));

  const scroll=h('div',{class:'scroll'});
  const list=h('div',{style:{padding:'0 14px'}});
  Object.entries(PROGRAM).forEach(([dn,cfg])=>{
    const t=cfg.exercises.length,done=doneCount(cfg.exercises),full=done===t&&t>0;
    list.appendChild(h('button',{class:'day-card',style:{borderLeft:'4px solid '+cfg.color,background:full?cfg.color+'08':'var(--card)'},
      onClick:()=>{V.day=dn;V.view='session';V.openEx=null;V.showAdd=false;V.addFilter='';render()}},
      h('div',{class:'day-left'},h('span',{style:{fontSize:'20px'}},cfg.icon),h('div',null,h('div',{class:'day-name'},dn.split(' - ')[1]),h('div',{class:'day-num'},dn.split(' - ')[0]))),
      h('div',{class:'day-right'},
        done>0?h('span',{style:{fontSize:'11px',color:cfg.color,fontWeight:600,fontFamily:'monospace'}},done+'/'+t):null,
        full?h('span',{style:{fontSize:'14px'}},'✓'):null,
        h('span',{style:{color:'#444',fontSize:'14px'}},'›'))));
  });
  scroll.appendChild(list);

  scroll.appendChild(h('button',{class:'vol-toggle',onClick:()=>{V.showVol=!V.showVol;render()}},(V.showVol?'Hide':'📊')+' Weekly Volume'));
  if(V.showVol){
    const wv=weeklyVol(),card=h('div',{class:'vol-card'});
    card.appendChild(h('div',{style:{fontSize:'11px',fontWeight:700,color:'#777',marginBottom:'10px',letterSpacing:'1px'}},'WEEKLY SETS · BLOCK 1'));
    Object.entries(VOL_TARGETS).forEach(([m,[min,max]])=>{
      const c=wv[m]||0,pct=Math.min(c/max*100,100),clr=c>max?'var(--amber)':c<min?'#444':'var(--green)';
      card.appendChild(h('div',{class:'vol-row'},
        h('div',{class:'vol-header'},h('span',{style:{color:'#aaa'}},m),h('span',{style:{color:clr,fontWeight:600,fontFamily:'monospace'}},c+'/'+min+'–'+max)),
        h('div',{class:'vol-bar'},h('div',{class:'vol-fill',style:{width:pct+'%',background:clr}}))));
    });
    scroll.appendChild(card);
  }
  app.appendChild(scroll);
}

function renderSession(app){
  const cfg=PROGRAM[V.day];if(!cfg)return;
  const extras=sess()._extras||[];
  const allEx=[...cfg.exercises,...extras.map(e=>({...e,isExtra:true}))];

  app.appendChild(h('div',{class:'sess-head'},
    h('button',{class:'back-btn',onClick:()=>{V.view='home';V.openEx=null;V.showAdd=false;stopRest();render()}},'←'),
    h('div',{style:{flex:1}},
      h('div',{style:{fontSize:'14px',fontWeight:700,color:'#eee'}},cfg.icon+' '+V.day.split(' - ')[1]),
      h('div',{style:{fontSize:'11px',color:'#666'}},fmtDate(V.date)))));

  // Rest bar (persistent, updated by timer without re-render)
  const rb=h('div',{class:'rest-bar',id:'rest-bar',style:{display:V.restOn?'flex':'none'}},
    h('div',null,h('span',{style:{fontSize:'11px',color:'#777',letterSpacing:'1px'}},'REST '),h('span',{class:'rest-time'+(V.restSec<=5?' warn':'')},fmtTime(V.restSec))),
    h('div',{class:'rest-btns'},
      ...REST_OPTS.map(o=>h('button',{class:'rest-btn rest-opt'+(V.restDur===o.sec?' on':''),'data-sec':String(o.sec),onClick:()=>startRest(o.sec)},o.label)),
      h('button',{class:'rest-btn stop',onClick:stopRest},'✕')));
  app.appendChild(rb);

  const scroll=h('div',{class:'scroll'});
  const list=h('div',{style:{padding:'0 10px',paddingBottom:V.showAdd?'320px':'80px'}});

  allEx.forEach((ex,i)=>{
    const isOpen=V.openEx===i;
    const sets=exSets(ex.name);
    const hasData=sets.length>0&&(sets[0].weight||sets[0].reps||sets[0].notes||sets[0].duration);
    const preview=hasData&&ex.type==='strength'?sets.filter(s=>s.weight).map(s=>s.weight+'×'+(s.reps||'?')).join(' → '):'';

    const btn=h('button',{class:'ex-btn',style:{borderLeft:'3px solid '+(hasData?'var(--green)':ex.isExtra?'var(--amber)':cfg.color)},
      onClick:()=>{V.openEx=isOpen?null:i;V.curSet=0;render()}},
      h('div',{style:{flex:1}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},h('span',{class:'ex-name'},ex.name),ex.isExtra?h('span',{class:'extra-tag'},'EXTRA'):null),
        h('div',{class:'ex-rx'},ex.rx),
        preview?h('div',{class:'ex-preview'},preview):null),
      h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
        hasData?h('span',{style:{color:'var(--green)',fontSize:'13px'}},'✓'):null,
        h('span',{style:{color:'#444',fontSize:'15px',transform:isOpen?'rotate(90deg)':'none',transition:'transform .15s'}},'›')));
    list.appendChild(btn);

    if(isOpen){
      const panel=h('div',{class:'ex-panel'});
      const prev=getPrev(ex.name);
      const pr=getPR(ex.name);

      // ─── CARDIO PANEL ───
      if(ex.type==='cardio'||ex.type==='mobility'){
        if(ex.type==='cardio'){
          // Reference: last session
          if(prev){
            const ps=prev.sets[0]||{};
            const parts=[];
            if(ps.duration)parts.push(ps.duration+'min');
            if(ps.speed)parts.push(ps.speed+'mph');
            if(ps.elevation)parts.push(ps.elevation+'ft');
            if(parts.length||ps.notes)
              panel.appendChild(h('div',{class:'ref-box'},h('div',{class:'label'},'LAST · '+prev.date),h('div',{class:'vals'},parts.join(' · ')+(ps.notes?' — '+ps.notes:''))));
          }

          const cur=sets[0]||{};
          const grid=h('div',{class:'cardio-grid'});

          // Duration
          const df=h('div',{class:'cardio-field'});
          df.appendChild(h('label',null,'DURATION (min)'));
          const di=h('input',{class:'inp',type:'number',inputMode:'decimal',placeholder:'45'});
          di.value=cur.duration||'';
          di.addEventListener('blur',e=>{setCardio(ex.name,'duration',e.target.value)});
          df.appendChild(di);
          grid.appendChild(df);

          // Speed
          const sf=h('div',{class:'cardio-field'});
          sf.appendChild(h('label',null,'SPEED (mph)'));
          const si2=h('input',{class:'inp',type:'number',inputMode:'decimal',placeholder:'4.2'});
          si2.value=cur.speed||'';
          si2.addEventListener('blur',e=>{setCardio(ex.name,'speed',e.target.value)});
          sf.appendChild(si2);
          grid.appendChild(sf);

          // Elevation
          const ef=h('div',{class:'cardio-field'});
          ef.appendChild(h('label',null,'ELEVATION (ft)'));
          const ei=h('input',{class:'inp',type:'number',inputMode:'decimal',placeholder:'0'});
          ei.value=cur.elevation||'';
          ei.addEventListener('blur',e=>{setCardio(ex.name,'elevation',e.target.value)});
          ef.appendChild(ei);
          grid.appendChild(ef);

          panel.appendChild(grid);

          // Notes
          panel.appendChild(h('label',{class:'field-label'},'NOTES'));
          const ni=h('textarea',{class:'inp',rows:'2',placeholder:'HR, pace, terrain...'});
          ni.value=cur.notes||'';
          ni.addEventListener('blur',e=>{setCardio(ex.name,'notes',e.target.value)});
          panel.appendChild(ni);
        } else {
          // Mobility — just notes
          const cur=sets[0]||{};
          const ni=h('textarea',{class:'inp',rows:'2',placeholder:'Notes...'});
          ni.value=cur.notes||'';
          ni.addEventListener('blur',e=>{setCardio(ex.name,'notes',e.target.value)});
          panel.appendChild(ni);
        }
        panel.appendChild(h('button',{class:'quick-done',onClick:()=>{
          if(!sets[0]?.notes&&!sets[0]?.duration)setCardio(ex.name,'notes','✓ Done');
          V.openEx=null;toast('Logged ✓');render()}},'Mark Done ✓'));

      // ─── STRENGTH PANEL ───
      } else {
        // Reference box: last session + PR
        if(prev||pr){
          const box=h('div',{class:'ref-box'});
          if(prev){
            box.appendChild(h('div',{class:'label'},'LAST · '+prev.date));
            box.appendChild(h('div',{class:'vals'},...prev.sets.map((s,si)=>h('span',{style:{marginRight:'10px'}},'S'+(si+1)+': '+s.weight+'×'+s.reps+(s.rir?' @'+s.rir:'')))));
          }
          if(pr){
            box.appendChild(h('div',{class:'label',style:{marginTop:prev?'6px':'0'}},'ALL-TIME PR'));
            box.appendChild(h('div',{class:'vals pr'},pr.weight+'lb × '+pr.reps+' reps ('+pr.date+')'));
          }
          panel.appendChild(box);
        }

        // Set tabs
        const num=Math.max(ex.sets||2,sets.length);
        const tabs=h('div',{class:'set-tabs'});
        for(let si=0;si<=num;si++){
          const s=sets[si],filled=s&&(s.weight||s.reps);
          tabs.appendChild(h('button',{class:'set-tab'+(V.curSet===si?' active':filled?' done':''),onClick:()=>{V.curSet=si;render()}},si<num?'S'+(si+1):'+'));
        }
        panel.appendChild(tabs);

        const cur=sets[V.curSet]||{};
        const weights=getWeights(ex.name);
        const isLast=V.curSet>=num-1;

        // Weight buttons
        panel.appendChild(h('label',{class:'field-label'},'WEIGHT'));
        const wr=h('div',{class:'quick-row'});
        weights.forEach(w=>{
          const b=h('button',{class:'q-btn'+(cur.weight==w?' on':''),onClick:()=>{
            setData(ex.name,V.curSet,'weight',w);
            wr.querySelectorAll('.q-btn').forEach(x=>x.classList.remove('on'));
            b.classList.add('on');
            const ci=panel.querySelector('.weight-custom');if(ci)ci.value=w;
          }},String(w));
          wr.appendChild(b);
        });
        panel.appendChild(wr);

        // Custom weight input
        const wi=h('input',{class:'inp weight-custom',type:'number',inputMode:'decimal',placeholder:'Custom weight',style:{marginBottom:'4px'}});
        wi.value=cur.weight||'';
        wi.addEventListener('blur',e=>{
          const val=e.target.value;
          if(val){setData(ex.name,V.curSet,'weight',parseFloat(val)||val);
            wr.querySelectorAll('.q-btn').forEach(x=>{x.classList.toggle('on',x.textContent==val)})}
        });
        panel.appendChild(wi);

        // Reps
        panel.appendChild(h('label',{class:'field-label'},'REPS'));
        const rr=h('div',{class:'quick-row'});
        [3,4,5,6,7,8,10,12,15,20].forEach(v=>{
          const b=h('button',{class:'q-btn'+(cur.reps==v?' on':''),style:{minWidth:'36px'},onClick:()=>{
            setData(ex.name,V.curSet,'reps',v);
            rr.querySelectorAll('.q-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');
          }},String(v));
          rr.appendChild(b);
        });
        panel.appendChild(rr);

        // RIR
        panel.appendChild(h('label',{class:'field-label'},'RIR'));
        const ir=h('div',{class:'quick-row'});
        RIR_OPTS.forEach(v=>{
          const b=h('button',{class:'q-btn'+(cur.rir===v?' on':''),onClick:()=>{
            setData(ex.name,V.curSet,'rir',v);
            ir.querySelectorAll('.q-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');
          }},v);
          ir.appendChild(b);
        });
        panel.appendChild(ir);

        // Notes (collapsible)
        if(cur.notes){
          panel.appendChild(h('label',{class:'field-label'},'NOTES'));
          const ni=h('input',{class:'inp',type:'text',placeholder:'Form cue, tempo...'});
          ni.value=cur.notes||'';
          ni.addEventListener('blur',e=>setData(ex.name,V.curSet,'notes',e.target.value));
          panel.appendChild(ni);
        } else {
          panel.appendChild(h('button',{class:'note-toggle',onClick:()=>{
            setData(ex.name,V.curSet,'notes',' ');render();
          }},'+ note'));
        }

        // Next / Done
        panel.appendChild(h('button',{class:'next-btn',onClick:()=>{
          // Explicitly capture any unsaved input values before re-render
          const cwi=panel.querySelector('.weight-custom');
          if(cwi&&cwi.value)setData(ex.name,V.curSet,'weight',parseFloat(cwi.value)||cwi.value);
          startRest(V.restDur);
          if(V.curSet<num-1){V.curSet++;render()}
          else{toast(ex.name+' logged');V.openEx=i+1<allEx.length?i+1:null;V.curSet=0;render()}
        }},isLast?'Done ✓':'Next Set →'));
      }

      if(ex.isExtra)panel.appendChild(h('button',{class:'remove-btn',onClick:()=>{removeExtra(ex.name);render()}},'Remove from session'));
      list.appendChild(panel);
    }
  });

  // Add exercise
  list.appendChild(h('button',{class:'add-btn',style:{borderColor:V.showAdd?'var(--accent)':'#282838'},
    onClick:()=>{V.showAdd=!V.showAdd;V.addFilter='';render()}},V.showAdd?'✕ Cancel':'+ Add Exercise'));

  if(V.showAdd){
    const ap=h('div',{class:'add-panel'});
    const si=h('input',{class:'inp',type:'text',placeholder:'Search or type new exercise...',style:{marginBottom:'10px'}});
    si.value=V.addFilter;
    si.addEventListener('input',e=>{
      V.addFilter=e.target.value;
      renderAddList(ap,allEx);
    });
    ap.appendChild(si);
    setTimeout(()=>si.focus(),50);

    const addList=h('div',{id:'add-list-container'});
    ap.appendChild(addList);
    list.appendChild(ap);
    renderAddList(ap,allEx);
  }

  scroll.appendChild(list);
  app.appendChild(scroll);
}

function renderAddList(ap,allEx){
  const container=ap.querySelector('#add-list-container');
  if(!container)return;
  container.innerHTML='';
  const allNames=allEx.map(e=>e.name);
  const filtered=[...COMMON_EXTRAS,...customExercises].filter((n,i,a)=>a.indexOf(n)===i)
    .filter(n=>!allNames.includes(n)&&(!V.addFilter||n.toLowerCase().includes(V.addFilter.toLowerCase())));

  if(V.addFilter&&!filtered.find(n=>n.toLowerCase()===V.addFilter.toLowerCase())){
    const row=h('div',{style:{display:'flex',gap:'6px',marginBottom:'8px'}});
    row.appendChild(h('button',{class:'custom-add',style:{flex:1},onClick:()=>{addExtra2(V.addFilter,'strength')}},'+ "'+V.addFilter+'" 🏋️'));
    row.appendChild(h('button',{class:'custom-add',onClick:()=>{addExtra2(V.addFilter,'cardio')}},'🫁'));
    row.appendChild(h('button',{class:'custom-add',onClick:()=>{addExtra2(V.addFilter,'mobility')}},'🧘'));
    container.appendChild(row);
  }
  const ol=h('div',{style:{maxHeight:'220px',overflow:'auto',WebkitOverflowScrolling:'touch'}});
  filtered.slice(0,20).forEach(name=>{
    ol.appendChild(h('button',{class:'extra-opt',onClick:()=>addExtra2(name)},
      h('span',null,name),h('span',{style:{color:'#444',fontSize:'10px'}},(MUSCLE_MAP[name]||[]).join(', '))));
  });
  container.appendChild(ol);
}

function addExtra2(name,type){
  const d=dk();
  if(!history[d])history[d]={_day:V.day};
  if(!history[d]._extras)history[d]._extras=[];
  if(history[d]._extras.find(e=>e.name===name))return;
  history[d]._extras.push({name,rx:'Custom',type:type||'strength',sets:3});
  if(!customExercises.includes(name)&&!COMMON_EXTRAS.includes(name))customExercises.push(name);
  V.showAdd=false;V.addFilter='';save();toast(name+' added');render();
}

function removeExtra(exName){
  const d=dk();
  if(history[d]){history[d]._extras=(history[d]._extras||[]).filter(e=>e.name!==exName);delete history[d][exName]}
  V.openEx=null;save();
}

// ─── EXPORT / IMPORT ───
function exportJson(){
  const d=JSON.stringify({history,customExercises,weightMemory,exportedAt:new Date().toISOString()},null,2);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:'application/json'}));
  a.download='ironlog-'+dk()+'.json';a.click();toast('Exported!');
}
function importJson(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
      if(d.history)Object.keys(d.history).forEach(k=>{if(!history[k])history[k]=d.history[k];else Object.keys(d.history[k]).forEach(ex=>{if(!history[k][ex])history[k][ex]=d.history[k][ex]})});
      if(d.customExercises)customExercises=[...new Set([...customExercises,...d.customExercises])];
      if(d.weightMemory)Object.keys(d.weightMemory).forEach(k=>{if(!weightMemory[k])weightMemory[k]=d.weightMemory[k];else weightMemory[k]=[...new Set([...weightMemory[k],...d.weightMemory[k]])].sort((a,b)=>a-b)});
      save();toast('Imported!');render()}catch{toast('Invalid file')}};r.readAsText(f)};inp.click();
}
function exportXlsx(){
  if(typeof XLSX==='undefined'){toast('XLSX not loaded');return}
  const wb=XLSX.utils.book_new();
  // Training Log
  const rows=[['Date','Day','Exercise','Set','Weight','Reps','RIR','Duration','Speed','Elevation','Notes','Muscles']];
  Object.keys(history).sort().forEach(d=>{const s=history[d],day=(s._day||'').split(' - ')[1]||'';
    Object.keys(s).forEach(ex=>{if(ex.startsWith('_'))return;const sets=s[ex];if(!Array.isArray(sets))return;
      sets.forEach((st,si)=>{rows.push([d,day,ex,st.type==='cardio'?'—':si+1,st.weight||'',st.reps||'',st.rir||'',st.duration||'',st.speed||'',st.elevation||'',st.notes||'',(MUSCLE_MAP[ex]||[]).join(', ')])})})});
  const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:12},{wch:20},{wch:28},{wch:5},{wch:8},{wch:5},{wch:6},{wch:8},{wch:6},{wch:8},{wch:30},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,'Training Log');
  // Weekly Volume
  const vr=[['Week','Back','Chest','Delts','Arms','Quads','Hamstrings','Glutes']];
  const dates=Object.keys(history).sort();
  if(dates.length){
    const first=new Date(dates[0]+'T12:00:00'),last=new Date(dates[dates.length-1]+'T12:00:00');
    const ws2=new Date(first);ws2.setDate(first.getDate()-first.getDay());
    while(ws2<=last){const we=new Date(ws2);we.setDate(ws2.getDate()+6);const vol={};
      dates.forEach(d=>{const dt=new Date(d+'T12:00:00');if(dt>=ws2&&dt<=we)Object.keys(history[d]).forEach(ex=>{if(ex.startsWith('_'))return;
        (MUSCLE_MAP[ex]||[]).forEach(m=>{const sets=Array.isArray(history[d][ex])?history[d][ex].filter(s=>s.weight||s.reps):[];vol[m]=(vol[m]||0)+sets.length})})});
      vr.push([ws2.toISOString().split('T')[0],vol.Back||0,vol.Chest||0,vol.Delts||0,vol.Arms||0,vol.Quads||0,vol.Hamstrings||0,vol.Glutes||0]);ws2.setDate(ws2.getDate()+7)}
  }
  const wv=XLSX.utils.aoa_to_sheet(vr);XLSX.utils.book_append_sheet(wb,wv,'Weekly Volume');
  // PRs
  const pr=[['Exercise','Best Weight','Reps','Date','Muscles']];
  const pm={};dates.forEach(d=>{Object.keys(history[d]).forEach(ex=>{if(ex.startsWith('_'))return;
    (history[d][ex]||[]).forEach(s=>{const w=parseFloat(s.weight);if(!isNaN(w)&&(!pm[ex]||w>pm[ex].w))pm[ex]={w,r:s.reps||'',d}})})});
  Object.keys(pm).sort().forEach(ex=>pr.push([ex,pm[ex].w,pm[ex].r,pm[ex].d,(MUSCLE_MAP[ex]||[]).join(', ')]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pr),'PRs');
  XLSX.writeFile(wb,'IronLog-'+dk()+'.xlsx');toast('Excel exported!');
}

// ─── INIT ───
render();
if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
