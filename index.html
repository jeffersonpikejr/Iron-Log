<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{color-scheme:dark;--bg:#0b0b18;--card:#131324;--panel:#151530;--border:#1e1e36;--text:#ddd;--dim:#555;--accent:#818cf8;--green:#22c55e;--red:#dc2626;--amber:#f59e0b;--gold:#fbbf24}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased}
#app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
.header{padding:14px 14px 6px;padding-top:calc(env(safe-area-inset-top,20px) + 10px);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.logo{font:800 19px 'Courier New',monospace;color:#eee;letter-spacing:-0.5px}
.date-chip{font-size:12px;color:#888;background:var(--card);padding:5px 12px;border-radius:20px}
.date-nav{display:flex;justify-content:center;gap:8px;padding:6px 14px 12px;flex-shrink:0}
.date-btn{background:var(--card);border:none;color:#888;font-size:14px;padding:6px 16px;border-radius:8px;font-weight:600}
.date-btn.today-glow{border:1.5px solid var(--gold);color:var(--gold);box-shadow:0 0 8px #fbbf2433}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,20px)}
.day-card{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 12px;margin-bottom:5px;border-radius:10px;border:none;background:var(--card);cursor:pointer;text-align:left}
.day-left{display:flex;align-items:center;gap:10px;flex:1}
.day-name{font-size:13px;font-weight:700;color:#ddd}
.day-num{font-size:11px;color:var(--dim);margin-top:1px}
.day-right{display:flex;align-items:center;gap:8px}
.ex-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.ex-btn{flex:1;display:flex;align-items:center;padding:11px 10px;border-radius:8px;border:none;cursor:pointer;background:#111122;text-align:left}
.ex-name{font-size:13px;font-weight:600;color:#ddd}
.ex-rx{font-size:11px;color:var(--dim);margin-top:2px;font-family:monospace}
.ex-preview{font-size:10px;color:#4a4a6a;margin-top:3px;font-family:monospace}
.ex-panel{padding:10px;background:var(--panel);border-radius:0 0 8px 8px;margin-top:-7px;margin-bottom:5px}
.ref-box{background:#0c0c1a;border-radius:8px;padding:8px 10px;margin-bottom:10px;border-left:2px solid #252540;font-size:11px;color:#888}
.ref-box .label{font-size:9px;color:#555;letter-spacing:1px;font-weight:700;margin-bottom:3px}
.ref-box .vals{font-family:monospace;font-size:12px}
.ref-box .pr{color:var(--amber)}
.set-tabs{display:flex;gap:3px;margin-bottom:10px}
.set-tab{border:none;padding:6px 12px;border-radius:6px 6px 0 0;cursor:pointer;font:600 12px monospace;background:#0e0e1e;color:#444;border-bottom:2px solid transparent}
.set-tab.active{background:#2a2a4a;color:#fff;border-bottom-color:var(--accent)}
.set-tab.done{background:#142014;color:var(--green)}
.field-label{font:700 10px/1 sans-serif;color:var(--dim);letter-spacing:1.5px;margin-bottom:6px;display:block;margin-top:10px}
.field-label:first-child{margin-top:0}
.quick-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.q-btn{border:none;padding:9px 12px;border-radius:8px;cursor:pointer;font:400 13px monospace;min-width:40px;text-align:center;background:#141428;color:#888;transition:background .1s}
.q-btn.on{background:var(--accent);color:#fff;font-weight:700}
.inp{width:100%;background:#0c0c1a;border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font:15px monospace;outline:none}
.inp:focus{border-color:var(--accent)}
textarea.inp{font:14px -apple-system,sans-serif;resize:vertical}
.next-btn{width:100%;background:var(--accent);border:none;color:#fff;padding:12px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;letter-spacing:0.3px;margin-top:8px}

.vol-toggle{display:block;margin:10px auto;background:none;border:1px solid #222;color:#666;font-size:12px;padding:6px 16px;border-radius:20px;cursor:pointer;font-weight:500}
.vol-card{margin:6px 14px;padding:14px;background:var(--card);border-radius:12px}
.vol-row{margin-bottom:8px}
.vol-header{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}
.vol-bar{height:5px;background:#1a1a2e;border-radius:3px;overflow:hidden}
.vol-fill{height:100%;border-radius:3px;transition:width 0.3s}
.sess-head{padding:12px 14px;padding-top:calc(env(safe-area-inset-top,20px) + 10px);display:flex;align-items:center;gap:10px;border-bottom:1px solid #181830;flex-shrink:0}
.back-btn{background:none;border:none;color:var(--accent);font-size:16px;cursor:pointer;padding:4px 8px;font-weight:700}
.rest-bar{margin:0 10px 8px;background:#141428;border-radius:10px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.rest-time{font:800 22px monospace;color:var(--accent)}
.rest-time.warn{color:var(--red)}
.rest-btns{display:flex;gap:6px}
.rest-btn{background:#1e1e36;border:none;color:#888;padding:4px 8px;border-radius:6px;font-size:11px;cursor:pointer}
.rest-btn.on{background:var(--accent);color:#fff}
.rest-btn.stop{background:#261616;color:var(--red)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 24px;border-radius:24px;font-size:13px;font-weight:700;z-index:100;box-shadow:0 4px 20px rgba(34,197,94,0.3);animation:fadeIn .15s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.data-panel{margin:0 14px 10px;padding:14px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.data-btn{flex:1;background:#141428;border:1px solid #2a2a4a;color:var(--accent);padding:10px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.remove-btn{margin-top:10px;width:100%;background:none;border:1px solid #331a1a;color:var(--red);font-size:12px;padding:8px;border-radius:8px;cursor:pointer}
.cardio-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.cardio-field{display:flex;flex-direction:column;gap:4px}
.cardio-field label{font:700 9px sans-serif;color:var(--dim);letter-spacing:1px}
.cardio-field .inp{font-size:14px;padding:8px 10px}
.reorder-btn{background:#1a1a2e;border:none;color:#666;font-size:16px;padding:4px 8px;border-radius:6px;cursor:pointer;line-height:1;flex-shrink:0}
.reorder-btn:active{background:var(--accent);color:#fff}
.reorder-toggle{background:none;border:1px solid #282838;color:#666;padding:6px 12px;border-radius:8px;font-size:11px;cursor:pointer;font-weight:600}
.reorder-toggle.on{border-color:var(--accent);color:var(--accent)}
.prog-bar{display:flex;align-items:center;gap:8px;width:calc(100% - 28px);margin:0 14px 8px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;text-align:left}
.prog-bar .plabel{font-size:9px;color:#666;letter-spacing:1.5px;font-weight:700;margin-bottom:2px}
.prog-bar .pname{font-size:14px;font-weight:700;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mini-btn{background:#1a1a2e;border:none;color:#888;font-size:13px;padding:6px 10px;border-radius:7px;cursor:pointer;font-weight:600;flex-shrink:0}
.mini-btn:active{background:var(--accent);color:#fff}
.mini-btn.del{color:var(--red)}
.mini-btn.del:active{background:var(--red);color:#fff}
</style>

// Old defaults + common extras (all available via + Add Exercise)

// ─── STORAGE ───
const LS={get(k,d){try{const v=localStorage.getItem('ironlog-'+k);return v?JSON.parse(v):d}catch{return d}},set(k,v){try{localStorage.setItem('ironlog-'+k,JSON.stringify(v));return true}catch(err){console.warn('LS write failed',err);return false}}};
let history=LS.get('history',{});
let customExercises=LS.get('customs',[]);
let weightMemory=LS.get('weights',{});
let exerciseOrder=LS.get('order',{}); // {dayName: [exName1, exName2, ...]}

// ─── PROGRAMS (multi-program support) ───
// Each program = {name, days:{ "<workout key>":{color,icon,exercises:[{name,rx,type,sets}]} }, dayOrder:[keys]}
// History / PRs / weight memory stay keyed by date + exercise name, so they are shared
// across all programs and untouched by program changes.
function seedPrograms(){const did='vo2max-low-vol';
  return {active:did,order:[did],list:{[did]:{name:'VO2Max + Low Vol Lifting',
    days:JSON.parse(JSON.stringify(DEFAULT_WORKOUTS)),dayOrder:Object.keys(DEFAULT_WORKOUTS)}}}}
// Deep-validate / self-heal the persisted (untrusted) programs blob so a partial or
// corrupt store can never brick boot or rendering. Falls back to a fresh seed only when
// the active program is wholly unrecoverable — logged history is never touched.
function sanitizePrograms(P){
  if(!P||typeof P!=='object'||!P.list||typeof P.list!=='object')return seedPrograms();
  Object.values(P.list).forEach(p=>{if(!p||typeof p!=='object')return;
    if(!p.name)p.name='Program';
    p.days=(p.days&&typeof p.days==='object')?p.days:{};
    p.dayOrder=Array.isArray(p.dayOrder)?p.dayOrder:Object.keys(p.days);
    Object.values(p.days).forEach(c=>{if(c&&typeof c==='object'&&!Array.isArray(c.exercises))c.exercises=[]})});
  if(!Array.isArray(P.order))P.order=Object.keys(P.list);
  if(!P.active||!P.list[P.active]||!P.list[P.active].days)P.active=Object.keys(P.list)[0];
  if(!P.active||!P.list[P.active])return seedPrograms();
  return P;
}
let programs=sanitizePrograms(LS.get('programs',null));
let PROGRAM=programs.list[programs.active].days;
function activeProg(){return programs.list[programs.active]}

function getOrderedExercises(dayName){
  const cfg=PROGRAM[dayName];if(!cfg)return[];
  const prescribed=cfg.exercises;
  const extras=(sess()._extras||[]).map(e=>({...e,isExtra:true}));
  const all=[...prescribed,...extras];
  const order=exerciseOrder[dayName];
  if(!order)return all;
  // Sort by saved order, append any new exercises at end
  const ordered=[];
  order.forEach(name=>{const ex=all.find(e=>e.name===name);if(ex)ordered.push(ex)});
  all.forEach(ex=>{if(!ordered.find(e=>e.name===ex.name))ordered.push(ex)});
  return ordered;
}
function moveExercise(dayName,fromIdx,toIdx){
  const allEx=getOrderedExercises(dayName);

  const item=allEx.splice(fromIdx,1)[0];

}

function addWorkout(name,icon,color){const pr=activeProg();let base=(name||'').trim()||'New Workout',disp=base,n=2;
  const taken=()=>Object.keys(pr.days).some(k=>wkName(k).toLowerCase()===disp.toLowerCase()); // dedupe on visible name
  while(taken()){disp=base+' '+n;n++}
  const key=disp;
  const order=orderedWorkouts(); // capture before inserting the new day
  pr.days[key]={color:color||'#6b7280',icon:icon||'🏋️',exercises:[]};
  pr.dayOrder=[...order,key];save();return key}
function updateWorkout(oldKey,name,icon,color){const pr=activeProg();const cfg=pr.days[oldKey];if(!cfg)return oldKey;
  if(icon)cfg.icon=icon;if(color)cfg.color=color;
  let key=oldKey;const fullNm=(name||'').trim();
  if(fullNm&&fullNm!==oldKey){
    const lbl=wkLabel(fullNm);let disp=wkName(fullNm),base=disp,n=2;
    const taken=()=>Object.keys(pr.days).some(k=>k!==oldKey&&wkName(k).toLowerCase()===disp.toLowerCase());
    while(taken()){disp=base+' '+n;n++}
    const cand=lbl?lbl+' - '+disp:disp;
    if(cand!==oldKey){key=cand;const order=orderedWorkouts(); // capture order (oldKey in place) before mutating days
      pr.days[key]=cfg;delete pr.days[oldKey];
      pr.dayOrder=order.map(k=>k===oldKey?key:k);
      if(exerciseOrder[oldKey]){exerciseOrder[key]=exerciseOrder[oldKey];delete exerciseOrder[oldKey]}}}
  save();return key}

function setData(exName,si,field,val){
  const d=dk();
  if(!history[d])history[d]={_day:V.day};
  if(!history[d][exName])history[d][exName]=[];
  while(history[d][exName].length<=si)history[d][exName].push({});
  history[d][exName][si][field]=val;
  if(field==='weight'&&val){
    const num=parseFloat(val);
    if(!isNaN(num)){if(!weightMemory[exName])weightMemory[exName]=[];
      if(!weightMemory[exName].includes(num)){weightMemory[exName].push(num);weightMemory[exName].sort((a,b)=>a-b);
        if(weightMemory[exName].length>15)weightMemory[exName]=weightMemory[exName].slice(-15)}}
  }
  save();
}
function setCardio(exName,field,val){
  const d=dk();
  if(!history[d])history[d]={_day:V.day};
  if(!history[d][exName])history[d][exName]=[{}];
  if(!history[d][exName][0])history[d][exName][0]={};
  history[d][exName][0][field]=val;
  history[d][exName][0].type='cardio';
  save();
}
function getPrev(exName){
  const d=dk();
  for(const k of Object.keys(history).sort().reverse()){
    if(k===d)continue;const s=history[k]?.[exName];
    if(s?.length>0&&(s[0].weight||s[0].duration))return{date:k,sets:s}}
  return null;
}
function getPR(exName){
  let best=null;
  Object.keys(history).forEach(d=>{const s=history[d]?.[exName];if(!Array.isArray(s))return;
    s.forEach(set=>{const w=parseFloat(set.weight);if(!isNaN(w)&&(!best||w>best.weight))best={weight:w,reps:set.reps||'?',date:d}})});
  return best;
}
function getWeights(exName){
  let base=[...(SEED_WEIGHTS[exName]||FALLBACK_WEIGHTS)];
  const prev=getPrev(exName);
  if(prev)prev.sets.forEach(s=>{const w=parseFloat(s.weight);if(!isNaN(w)&&!base.includes(w))base.push(w)});
  const mem=weightMemory[exName];
  if(mem&&mem.length>0)mem.forEach(w=>{if(!base.includes(w))base.push(w)});
  const today=exSets(exName);
  today.forEach(s=>{const w=parseFloat(s.weight);if(!isNaN(w)&&!base.includes(w))base.push(w)});
  base=[...new Set(base)].sort((a,b)=>a-b);
  if(base.length>12){
    const recent=today.length>0?parseFloat(today[today.length-1].weight):(prev?.sets[0]?.weight?parseFloat(prev.sets[0].weight):null);
    if(recent){base.sort((a,b)=>Math.abs(a-recent)-Math.abs(b-recent));base=base.slice(0,12).sort((a,b)=>a-b)}
    else base=base.slice(-12);
  }
  return base;
}
function weeklyVol(){
  const start=new Date(V.date);start.setDate(V.date.getDate()-V.date.getDay());
  const end=new Date(start);end.setDate(start.getDate()+6);const vol={};
  Object.keys(history).forEach(d=>{const dt=new Date(d+'T12:00:00');
    if(dt>=start&&dt<=end){Object.keys(history[d]).forEach(ex=>{if(ex.startsWith('_'))return;
      (MUSCLE_MAP[ex]||[]).forEach(m=>{const sets=Array.isArray(history[d][ex])?history[d][ex].filter(s=>s.weight||s.reps):[];vol[m]=(vol[m]||0)+sets.length})})}});
  return vol;
}

function h(tag,attrs,...ch){

    if(k==='class')el.className=v;

    else el.setAttribute(k,v)});
  ch.flat().forEach(c=>{if(c!=null)el.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return el;
}

  if(!V.reorder){

function renderAddList(ap,allEx){
  const c=ap.querySelector('#add-list-container');if(!c)return;c.innerHTML='';
  const allNames=allEx.map(e=>e.name);
  const filtered=[...COMMON_EXTRAS,...customExercises].filter((n,i,a)=>a.indexOf(n)===i)
    .filter(n=>!allNames.includes(n)&&(!V.addFilter||n.toLowerCase().includes(V.addFilter.toLowerCase())));
  if(V.addFilter&&!filtered.find(n=>n.toLowerCase()===V.addFilter.toLowerCase())){
    const row=h('div',{style:{display:'flex',gap:'6px',marginBottom:'8px'}});
    row.appendChild(h('button',{class:'custom-add',style:{flex:1},onClick:()=>addExtra2(V.addFilter,'strength')},'+ "'+V.addFilter+'" 🏋️'));
    row.appendChild(h('button',{class:'custom-add',onClick:()=>addExtra2(V.addFilter,'cardio')},'🫁'));
    row.appendChild(h('button',{class:'custom-add',onClick:()=>addExtra2(V.addFilter,'mobility')},'🧘'));
    c.appendChild(row)}
  const ol=h('div',{style:{maxHeight:'220px',overflow:'auto',WebkitOverflowScrolling:'touch'}});
  filtered.slice(0,20).forEach(name=>{ol.appendChild(h('button',{class:'extra-opt',onClick:()=>addExtra2(name)},
    h('span',null,name),h('span',{style:{color:'#444',fontSize:'10px'}},(MUSCLE_MAP[name]||[]).join(', '))))});
  c.appendChild(ol);
}
function addExtra2(name,type){
  const d=dk();if(!history[d])history[d]={_day:V.day};if(!history[d]._extras)history[d]._extras=[];
  if(history[d]._extras.find(e=>e.name===name))return;
  history[d]._extras.push({name,rx:'Custom',type:type||'strength',sets:3});
  if(!customExercises.includes(name)&&!COMMON_EXTRAS.includes(name))customExercises.push(name);
  V.showAdd=false;V.addFilter='';save();toast(name+' added');render();}
function removeExtra(exName){const d=dk();if(history[d]){history[d]._extras=(history[d]._extras||[]).filter(e=>e.name!==exName);delete history[d][exName]}V.openEx=null;save()}

    ap.appendChild(h('label',{class:'field-label'},'SETS'));
    const sr=h('div',{class:'quick-row'});
    [1,2,3,4,5].forEach(n=>{const b=h('button',{class:'q-btn'+(st.sets===n?' on':''),style:{minWidth:'40px'},onClick:()=>{st.sets=n;sr.querySelectorAll('.q-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on')}},String(n));sr.appendChild(b)});
    ap.appendChild(sr);
    ap.appendChild(h('button',{class:'next-btn',onClick:()=>{if(!st.name.trim()){toast('Name required');return}
      const ok=editing?updateWorkoutExercise(key,V.exEditIdx,st):addWorkoutExercise(key,st);
      if(ok===false)return; // duplicate/invalid — keep the form open (toast already shown)
      V.exEditIdx=null;render()}},editing?'Save exercise':'Add exercise'));
    list.appendChild(ap);
  }

  const exs=cfg.exercises;
  list.appendChild(h('div',{style:{fontSize:'10px',fontWeight:700,color:'#666',letterSpacing:'1px',margin:'4px 2px 8px'}},'EXERCISES ('+exs.length+')'));
  exs.forEach((ex,i)=>{
    list.appendChild(h('div',{class:'ex-row'},
      h('div',{style:{display:'flex',flexDirection:'column',gap:'2px',marginRight:'4px'}},
        h('button',{class:'reorder-btn',onClick:()=>moveWorkoutExercise(key,i,-1)},'▲'),
        h('button',{class:'reorder-btn',onClick:()=>moveWorkoutExercise(key,i,1)},'▼')),
      h('button',{class:'ex-btn',style:{flex:1,minWidth:0},onClick:()=>{V.exEditIdx=i;render()}},
        h('div',{style:{flex:1,minWidth:0}},
          h('div',{class:'ex-name'},ex.name),
          h('div',{class:'ex-rx'},(ex.type!=='strength'?ex.type+' · ':'')+(ex.rx||(ex.sets+' sets')))),
        h('span',{style:{color:'#444',fontSize:'14px'}},'✎')),
      h('button',{class:'mini-btn del',onClick:()=>{if(confirm('Remove "'+ex.name+'" from this workout?')){deleteWorkoutExercise(key,i);render()}}},'✕')));
  });
  if(!exs.length)list.appendChild(h('div',{style:{padding:'16px 12px',textAlign:'center',color:'#666',fontSize:'12px'}},'No exercises yet — tap "+ Exercise".'));
  scroll.appendChild(list);app.appendChild(scroll);
}

// ─── EXPORT / IMPORT ───
function exportJson(){const d=JSON.stringify({history,customExercises,weightMemory,exerciseOrder,programs,exportedAt:new Date().toISOString()},null,2);
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([d],{type:'application/json'}));a.download='ironlog-'+dk()+'.json';a.click();toast('Exported!')}
function importJson(){const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);
      if(d.history)Object.keys(d.history).forEach(k=>{if(!history[k])history[k]=d.history[k];else Object.keys(d.history[k]).forEach(ex=>{if(!history[k][ex])history[k][ex]=d.history[k][ex]})});
      if(d.customExercises)customExercises=[...new Set([...customExercises,...d.customExercises])];
      if(d.weightMemory)Object.keys(d.weightMemory).forEach(k=>{if(!weightMemory[k])weightMemory[k]=d.weightMemory[k];else weightMemory[k]=[...new Set([...weightMemory[k],...d.weightMemory[k]])].sort((a,b)=>a-b)});
      if(d.exerciseOrder)Object.keys(d.exerciseOrder).forEach(k=>{if(!exerciseOrder[k])exerciseOrder[k]=d.exerciseOrder[k]});
      if(d.programs&&d.programs.list){const idMap={};
        Object.keys(d.programs.list).forEach(id=>{const p=d.programs.list[id];if(!p||typeof p!=='object')return;
          let nid=id;if(programs.list[nid]){nid=uid('prog');p.name=(p.name||'Program')+' (imported)'} // rename on id collision (e.g. seed id) instead of dropping
          idMap[id]=nid;programs.list[nid]=p});
        const inOrder=(d.programs.order||Object.keys(d.programs.list)).map(id=>idMap[id]).filter(Boolean);
        programs.order=[...new Set([...(programs.order||[]),...inOrder])].filter(id=>programs.list[id]);
        programs=sanitizePrograms(programs);PROGRAM=activeProg().days}
      save();toast('Imported!');render()}catch{toast('Invalid file')}};r.readAsText(f)};inp.click()}
// SheetJS is loaded on demand (only when exporting to Excel) to keep first paint fast.
const XLSX_URL='https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js';
let _xlsxP=null;
function loadXLSX(){
  if(window.XLSX)return Promise.resolve(window.XLSX);
  if(_xlsxP)return _xlsxP;
  _xlsxP=new Promise((res,rej)=>{const s=document.createElement('script');s.src=XLSX_URL;s.crossOrigin='anonymous';s.onload=()=>res(window.XLSX);s.onerror=()=>{_xlsxP=null;rej()};document.head.appendChild(s)});
  return _xlsxP;
}
async function exportXlsx(){
  let XLSX;try{XLSX=await loadXLSX()}catch{toast('Excel CDN unavailable — use JSON export');return}
  const wb=XLSX.utils.book_new();
  const rows=[['Date','Day','Exercise','Set','Weight','Reps','RIR','Duration','Speed','Elevation','Notes','Muscles']];
  Object.keys(history).sort().forEach(d=>{const s=history[d],day=(s._day||'').split(' - ')[1]||'';
    Object.keys(s).forEach(ex=>{if(ex.startsWith('_'))return;const sets=s[ex];if(!Array.isArray(sets))return;
      sets.forEach((st,si)=>{rows.push([d,day,ex,st.type==='cardio'?'—':si+1,st.weight||'',st.reps||'',st.rir||'',st.duration||'',st.speed||'',st.elevation||'',st.notes||'',(MUSCLE_MAP[ex]||[]).join(', ')])})})});
  const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:12},{wch:20},{wch:28},{wch:5},{wch:8},{wch:5},{wch:6},{wch:8},{wch:6},{wch:8},{wch:30},{wch:18}];
  XLSX.utils.book_append_sheet(wb,ws,'Training Log');
  const vr=[['Week','Back','Chest','Delts','Arms','Quads','Hamstrings','Glutes']];
  const dates=Object.keys(history).sort();
  if(dates.length){const first=new Date(dates[0]+'T12:00:00'),last=new Date(dates[dates.length-1]+'T12:00:00');
    const ws2=new Date(first);ws2.setDate(first.getDate()-first.getDay());
    while(ws2<=last){const we=new Date(ws2);we.setDate(ws2.getDate()+6);const vol={};
      dates.forEach(d=>{const dt=new Date(d+'T12:00:00');if(dt>=ws2&&dt<=we)Object.keys(history[d]).forEach(ex=>{if(ex.startsWith('_'))return;
        (MUSCLE_MAP[ex]||[]).forEach(m=>{const sets=Array.isArray(history[d][ex])?history[d][ex].filter(s=>s.weight||s.reps):[];vol[m]=(vol[m]||0)+sets.length})})});
      vr.push([ws2.toISOString().split('T')[0],vol.Back||0,vol.Chest||0,vol.Delts||0,vol.Arms||0,vol.Quads||0,vol.Hamstrings||0,vol.Glutes||0]);ws2.setDate(ws2.getDate()+7)}}
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(vr),'Weekly Volume');
  const pr=[['Exercise','Best Weight','Reps','Date','Muscles']];const pm={};
  dates.forEach(d=>{Object.keys(history[d]).forEach(ex=>{if(ex.startsWith('_'))return;
    (history[d][ex]||[]).forEach(s=>{const w=parseFloat(s.weight);if(!isNaN(w)&&(!pm[ex]||w>pm[ex].w))pm[ex]={w,r:s.reps||'',d}})})});
  Object.keys(pm).sort().forEach(ex=>pr.push([ex,pm[ex].w,pm[ex].r,pm[ex].d,(MUSCLE_MAP[ex]||[]).join(', ')]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(pr),'PRs');
  XLSX.writeFile(wb,'IronLog-'+dk()+'.xlsx');toast('Excel exported!')}

render();
if('serviceWorker' in navigator){
  let refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',()=>{
    // Reload once when a NEW worker takes over an already-controlled page (a deploy landed),
    // but not on the very first install (no prior controller existed).
    if(refreshing||!navigator.serviceWorker.controller)return;
    refreshing=true;window.location.reload();
  });
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
